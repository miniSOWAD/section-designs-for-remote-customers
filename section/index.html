<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Works - Premium Geometric</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #121212;
    --text: #ffffff;
    --muted: #a0a0a0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /*Custom Cursor*/
  .cursor-dot {
    position: fixed;
    top: 0; left: 0;
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  .cursor-ring {
    position: fixed;
    top: 0; left: 0;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
  }

  /*Spacers*/
  .spacer {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /*Section & Layout*/
  .featured-section {
    position: relative;
    padding: 100px 0;
    width: 100vw;
    overflow: hidden; 
  }

  .section-header {
    text-align: center;
    margin-bottom: 60px;
    position: relative;
    z-index: 10;
  }

  .section-title {
    font-family: 'Bebas Neue', 'Impact', sans-serif;
    font-size: clamp(4rem, 6vw, 6rem);
    letter-spacing: 2px;
    line-height: 1;
    text-transform: uppercase;
  }

  .section-eyebrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 15px;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .eyebrow-line {
    width: 60px;
    height: 1px;
    background: #333;
  }

  .cards-track {
    display: flex;
    align-items: center;
    gap: 30px; 
    width: max-content;
    padding: 0 5vw;
    margin: 0 auto;
    position: relative;
  }

  /*Cards Grid*/
  .card {
    position: relative;
    height: 60vh;
    min-height: 450px;
    cursor: none; 
    flex-shrink: 0;
  }

  .card-img-wrapper {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .card:hover img {
    transform: scale(1.06);
  }

  /*Left Card*/
  .card--left {
    width: 25vw;
    min-width: 300px;
  }
  .card--left .card-img-wrapper {
    /* The sharp cut left*/
    clip-path: polygon(0 0, 100% 0, 100% 65%, 0 100%);
  }

  /* Center Card */
  .card--center {
    width: 40vw;
    min-width: 500px;
    z-index: 5;
  }
  .card--center .card-img-wrapper {
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  /* Right Card */
  .card--right {
    width: 28vw;
    min-width: 350px;
  }
  .card--right .card-img-wrapper {
    /*The sharp cut*/
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 35%);
  }

  /*Text Inside the Black Void*/
  .card-content {
    position: absolute;
    z-index: 10;
  }

  /*Left Card*/
  .card--left .card-content {
    bottom: 20px;
    right: 0;
    text-align: right;
  }
  .left-subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .left-title {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1.2;
  }

  /*Right Card*/
  .card--right .card-content {
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 15px;
  }
  .right-pagination {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--text);
  }
  .right-pagination span {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--muted);
  }
  .right-tags {
    display: flex;
    gap: 10px;
  }
  .tag {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    font-size: 0.75rem;
    color: var(--muted);
  }

</style>
</head>
<body>

<!--Custom cursor-->
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="spacer">↓ Scroll Down ↓</div>

<section class="featured-section" id="featuredWorks">
  
  <div class="section-header">
    <h2 class="section-title">FEATURED WORKS</h2>
    <div class="section-eyebrow">
      <div class="eyebrow-line"></div>
      <span>(003)</span> • <span>ABOUT OUR STUDIO</span>
    </div>
  </div>

  <div class="cards-track" id="cardsTrack">
    
    <!--Left Card-->
    <div class="card card--left">
      <div class="card-img-wrapper">
        <img src="https://images.unsplash.com/photo-1618761714954-0b8cd0026356?q=80&w=800&auto=format&fit=crop" alt="UI Design">
      </div>
      <div class="card-content">
        <p class="left-subtitle">• Horizon Redesign</p>
        <h3 class="left-title">Website UI/UX Design</h3>
      </div>
    </div>

    <!--Center Card-->
    <div class="card card--center">
      <div class="card-img-wrapper">
        <img src="https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?q=80&w=1200&auto=format&fit=crop" alt="VR Headset">
      </div>
    </div>

    <!--Right Card-->
    <div class="card card--right">
      <div class="card-img-wrapper">
        <img src="https://images.unsplash.com/photo-1616469829581-73993eb86b02?q=80&w=1000&auto=format&fit=crop" alt="App Design">
      </div>
      <div class="card-content">
        <div class="right-pagination">02<span>/05</span></div>
        <div class="right-tags">
          <span class="tag">UI/UX Design</span>
          <span class="tag">2020</span>
        </div>
      </div>
    </div>

    <!--Ghost Card-->
    <div class="card card--right" style="opacity: 0.5;">
        <div class="card-img-wrapper" style="clip-path: none;">
          <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=800&auto=format&fit=crop" alt="Placeholder">
        </div>
    </div>

  </div>
</section>

<div class="spacer">↑ Scroll Up ↑</div>

<script>
//Custom Cursor Logic
const dot = document.getElementById('cursorDot');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => { 
  mx = e.clientX; 
  my = e.clientY; 
});

gsap.ticker.add(() => {
  rx += (mx - rx) * 0.15; 
  ry += (my - ry) * 0.15;
  gsap.set(dot, { x: mx, y: my });
  gsap.set(ring, { x: rx, y: ry });
});

// Cursor Hover Effects on Cards
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mouseenter', () => {
    gsap.to(ring, { width: 64, height: 64, borderColor: 'rgba(255,255,255,0.8)', duration: 0.3 });
    gsap.to(dot, { scale: 0, duration: 0.2 });
  });
  card.addEventListener('mouseleave', () => {
    gsap.to(ring, { width: 36, height: 36, borderColor: 'rgba(255,255,255,0.4)', duration: 0.3 });
    gsap.to(dot, { scale: 1, duration: 0.2 });
  });
});

const section = document.getElementById('featuredWorks');
const track = document.getElementById('cardsTrack');

let currentScroll = 0;
let isHoveringSection = false;

section.addEventListener('mouseenter', () => isHoveringSection = true);
section.addEventListener('mouseleave', () => isHoveringSection = false);

section.addEventListener('wheel', (e) => {
  if (!isHoveringSection) return;

  const maxScroll = track.scrollWidth - window.innerWidth + 100;

  currentScroll += e.deltaY; 

  if (currentScroll < 0) {
    currentScroll = 0;
  } else if (currentScroll > maxScroll) {
    currentScroll = maxScroll;
  } else {
    e.preventDefault(); 
  }

  // Smooth translation
  gsap.to(track, {
    x: -currentScroll,
    duration: 0.8,
    ease: "power3.out",
    overwrite: true
  });
}, { passive: false }); 

//Initial Entry Animations
gsap.from(".section-header", {
  y: 40,
  opacity: 0,
  duration: 1,
  ease: "power3.out",
  delay: 0.2
});

gsap.from(".card", {
  y: 80,
  opacity: 0,
  duration: 1.2,
  stagger: 0.15,
  ease: "expo.out",
  delay: 0.4
});
</script>
</body>
</html>
