<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Works - Dynamic Geometric Carousel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #121212;
    --text: #ffffff;
    --muted: #a0a0a0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* --- Custom Cursor --- */
  .cursor-dot {
    position: fixed;
    top: 0; left: 0;
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  .cursor-ring {
    position: fixed;
    top: 0; left: 0;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
  }

  /* --- Headers --- */
  .featured-section {
    position: relative;
    padding: 100px 0;
    width: 100vw;
    overflow: hidden; 
  }

  .section-header {
    text-align: center;
    margin-bottom: 60px;
    position: relative;
    z-index: 10;
  }

  .section-title {
    font-family: 'Bebas Neue', 'Impact', sans-serif;
    font-size: clamp(4rem, 6vw, 6rem);
    letter-spacing: 2px;
    line-height: 1;
    text-transform: uppercase;
  }

  .section-eyebrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 15px;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .eyebrow-line {
    width: 60px;
    height: 1px;
    background: #333;
  }

  /* --- Dynamic Carousel Container --- */
  .carousel-container {
    position: relative;
    width: 100vw;
    height: 60vh;
    min-height: 450px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* --- Base Card Styles --- */
  .card {
    position: absolute;
    width: 40vw; /* Base width for Center Card */
    min-width: 450px;
    height: 100%;
    cursor: none; 
    /* Cards start hidden and are revealed by JS */
    opacity: 0;
    visibility: hidden;
  }

  /* The actual image container that gets clipped */
  .card-img-wrapper {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    /* GSAP will animate the clip-path directly */
  }

  .card-img-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .card:hover .card-img-wrapper img {
    transform: scale(1.06);
  }

  /* --- Text Sitting in the Triangle Voids --- */
  /* Left Void Text */
  .left-content {
    position: absolute;
    bottom: 20px;
    left: 10px; /* Aligned left inside the void */
    z-index: 10;
    opacity: 0; /* JS handles visibility */
  }
  .left-subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .left-subtitle .dot {
    width: 4px; height: 4px; background: #c8ff00; border-radius: 50%;
  }
  .left-title {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1.2;
  }

  /* Right Void Text */
  .right-content {
    position: absolute;
    bottom: 20px;
    right: 20px; /* Aligned right inside the void */
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 15px;
    z-index: 10;
    opacity: 0; /* JS handles visibility */
  }
  .right-pagination {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--text);
  }
  .right-pagination span {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--muted);
  }
  .right-tags {
    display: flex;
    gap: 10px;
  }
  .tag {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    font-size: 0.75rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<!-- Custom cursor -->
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<section class="featured-section" id="featuredWorks">
  
  <div class="section-header">
    <h2 class="section-title">FEATURED WORKS</h2>
    <div class="section-eyebrow">
      <div class="eyebrow-line"></div>
      <span>(003)</span> • <span>ABOUT OUR STUDIO</span>
    </div>
  </div>

  <!-- JS will inject the assets here -->
  <div class="carousel-container" id="carousel"></div>

</section>

<script>
// --- 1. Custom Cursor Logic ---
const dot = document.getElementById('cursorDot');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => { 
  mx = e.clientX; my = e.clientY; 
});

gsap.ticker.add(() => {
  rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
  gsap.set(dot, { x: mx, y: my });
  gsap.set(ring, { x: rx, y: ry });
});

// --- 2. The Dynamic "Assets Folder" Data ---
const assetsFolder = [
  {
    image: "https://images.unsplash.com/photo-1618761714954-0b8cd0026356?q=80&w=800&auto=format&fit=crop",
    subtitle: "Horizon Redesign",
    title: "Website UI/UX Design",
    tags: ["UI/UX Design", "2020"]
  },
  {
    image: "https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?q=80&w=1200&auto=format&fit=crop",
    subtitle: "VR Experience",
    title: "Virtual Reality Setup",
    tags: ["3D Render", "2021"]
  },
  {
    image: "https://images.unsplash.com/photo-1616469829581-73993eb86b02?q=80&w=1000&auto=format&fit=crop",
    subtitle: "Fintech Startup",
    title: "Mobile App Design",
    tags: ["App Design", "2022"]
  },
  {
    image: "https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=800&auto=format&fit=crop",
    subtitle: "Studio Branding",
    title: "Creative Portfolio",
    tags: ["Branding", "2023"]
  },
  {
    image: "https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=800&auto=format&fit=crop",
    subtitle: "Web Platform",
    title: "Dashboard UI",
    tags: ["Web App", "2024"]
  }
];

// --- 3. Build the DOM from Assets ---
const carousel = document.getElementById('carousel');
const totalItems = assetsFolder.length;

assetsFolder.forEach((asset, index) => {
  // Format pagination number (e.g., "02/05")
  const pageNum = (index + 1).toString().padStart(2, '0');
  const totalStr = totalItems.toString().padStart(2, '0');

  const cardHTML = `
    <div class="card">
      <div class="card-img-wrapper">
        <img src="${asset.image}" alt="${asset.title}">
      </div>
      
      <!-- Text for the Left Void -->
      <div class="left-content">
        <p class="left-subtitle"><span class="dot"></span> ${asset.subtitle}</p>
        <h3 class="left-title">${asset.title}</h3>
      </div>

      <!-- Text for the Right Void -->
      <div class="right-content">
        <div class="right-pagination">${pageNum}<span>/${totalStr}</span></div>
        <div class="right-tags">
          <span class="tag">${asset.tags[0]}</span>
          <span class="tag">${asset.tags[1]}</span>
        </div>
      </div>
    </div>
  `;
  carousel.innerHTML += cardHTML;
});

const cards = document.querySelectorAll('.card');

// Add cursor hover effects to newly created cards
cards.forEach(card => {
  card.addEventListener('mouseenter', () => {
    gsap.to(ring, { width: 64, height: 64, borderColor: 'rgba(255,255,255,0.8)', duration: 0.3 });
    gsap.to(dot, { scale: 0, duration: 0.2 });
  });
  card.addEventListener('mouseleave', () => {
    gsap.to(ring, { width: 36, height: 36, borderColor: 'rgba(255,255,255,0.4)', duration: 0.3 });
    gsap.to(dot, { scale: 1, duration: 0.2 });
  });
});

// --- 4. The Magic GSAP Carousel Logic ---
let currentIndex = 0;

// Helper to determine relative position (-1 is Left, 0 is Center, 1 is Right)
function getPosition(index, current) {
  let diff = index - current;
  if (diff < -Math.floor(totalItems / 2)) diff += totalItems;
  if (diff > Math.floor(totalItems / 2)) diff -= totalItems;
  return diff;
}

function updateCarousel() {
  cards.forEach((card, i) => {
    const pos = getPosition(i, currentIndex);
    const imgWrapper = card.querySelector('.card-img-wrapper');
    const leftText = card.querySelector('.left-content');
    const rightText = card.querySelector('.right-content');

    // Make the card visible
    gsap.set(card, { visibility: 'visible' });

    if (pos === 0) {
      // 🟩 CENTER CARD: Full size, no cuts
      gsap.to(card, { xPercent: 0, scale: 1, zIndex: 5, opacity: 1, duration: 1.2, ease: 'power3.inOut' });
      gsap.to(imgWrapper, { clipPath: 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)', duration: 1.2, ease: 'power3.inOut' });
      gsap.to([leftText, rightText], { opacity: 0, duration: 0.4 }); // Hide all text

    } else if (pos === -1) {
      // 🟦 LEFT CARD: Scaled down, lower-left triangle cut
      gsap.to(card, { xPercent: -75, scale: 0.85, zIndex: 2, opacity: 1, duration: 1.2, ease: 'power3.inOut' });
      // The exact cut from Bottom-Right to Mid-Left
      gsap.to(imgWrapper, { clipPath: 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 35%)', duration: 1.2, ease: 'power3.inOut' });
      gsap.to(leftText, { opacity: 1, delay: 0.4, duration: 0.6 }); // Show Left text in the void
      gsap.to(rightText, { opacity: 0, duration: 0.4 });

    } else if (pos === 1) {
      // 🟧 RIGHT CARD: Scaled down, lower-right triangle cut
      gsap.to(card, { xPercent: 75, scale: 0.85, zIndex: 2, opacity: 1, duration: 1.2, ease: 'power3.inOut' });
      // The exact cut from Mid-Right to Bottom-Left
      gsap.to(imgWrapper, { clipPath: 'polygon(0% 0%, 100% 0%, 100% 35%, 0% 100%)', duration: 1.2, ease: 'power3.inOut' });
      gsap.to(leftText, { opacity: 0, duration: 0.4 });
      gsap.to(rightText, { opacity: 1, delay: 0.4, duration: 0.6 }); // Show Right text in the void

    } else if (pos < -1) {
      // Hidden Far Left
      gsap.to(card, { xPercent: -120, scale: 0.6, zIndex: 1, opacity: 0, duration: 1.2, ease: 'power3.inOut' });
    } else if (pos > 1) {
      // Hidden Far Right
      gsap.to(card, { xPercent: 120, scale: 0.6, zIndex: 1, opacity: 0, duration: 1.2, ease: 'power3.inOut' });
    }
  });
}

// Initial Setup
updateCarousel();

// Auto-play interval: Transitions automatically every 3.5 seconds
setInterval(() => {
  currentIndex = (currentIndex + 1) % totalItems;
  updateCarousel();
}, 3500);

</script>
</body>
</html>
